name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[mcp]"
          pip install mypy

      - name: Compile check
        run: python -c 'import py_compile; [py_compile.compile(f, doraise=True) for f in ["tmux_core.py", "tmuxx.py", "tmux_agent.py", "tmux_mcp.py"]]'

      - name: Unit tests
        run: python -m unittest test_tmux_agent_unit test_tmux_core_unit -v

      - name: Type check
        run: mypy tmux_core.py tmux_agent.py --ignore-missing-imports --no-error-summary || true
