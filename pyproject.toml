[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tmuxx"
version = "0.1.0"
description = "Terminal UI for managing tmux sessions, windows, and panes"
requires-python = ">=3.12"
dependencies = [
    "textual>=0.70.0",
]

[project.optional-dependencies]
mcp = ["mcp[cli]>=1.0"]

[tool.setuptools]
py-modules = ["tmux_tui", "tmux_mcp"]

[project.scripts]
tmuxx = "tmux_tui:main"
tmuxx-mcp = "tmux_mcp:main"
